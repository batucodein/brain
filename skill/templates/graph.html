<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_NAME}} — brain graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0E27;
    color: #E0E0E0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10, 14, 39, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  #header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
    letter-spacing: -0.01em;
  }

  #header h1 span {
    color: #64748B;
    font-weight: 400;
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #search {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 8px 14px;
    color: #E0E0E0;
    font-size: 13px;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus {
    border-color: rgba(255, 255, 255, 0.25);
  }

  #search::placeholder {
    color: #475569;
  }

  .filter-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 6px 14px;
    color: #94A3B8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #E0E0E0;
  }

  .filter-btn.active {
    border-color: var(--btn-color, rgba(255, 255, 255, 0.3));
    color: #FFFFFF;
    background: var(--btn-bg, rgba(255, 255, 255, 0.1));
  }

  .filter-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .view-toggle {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    padding: 6px 14px;
    color: #CBD5E1;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 8px;
  }

  .view-toggle:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #FFFFFF;
  }

  .view-toggle.active-timeline {
    border-color: #8B5CF6;
    color: #FFFFFF;
    background: rgba(139, 92, 246, 0.15);
  }

  #graph {
    width: 100vw;
    height: 100vh;
  }

  .node-label {
    font-size: 11px;
    fill: #CBD5E1;
    pointer-events: none;
    font-weight: 500;
  }

  .link {
    stroke-opacity: 0.4;
    stroke-width: 1.5;
  }

  .timeline-axis line {
    stroke: rgba(255, 255, 255, 0.08);
    stroke-width: 1;
  }

  .timeline-axis text {
    fill: #475569;
    font-size: 11px;
    font-weight: 500;
  }

  .timeline-lane-label {
    fill: #334155;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .timeline-lane-line {
    stroke: rgba(255, 255, 255, 0.03);
    stroke-width: 1;
  }

  #tooltip {
    position: fixed;
    display: none;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px 20px;
    max-width: 380px;
    font-size: 13px;
    line-height: 1.6;
    z-index: 200;
    pointer-events: none;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }

  #tooltip .tt-type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  #tooltip .tt-title {
    font-size: 15px;
    font-weight: 600;
    color: #FFFFFF;
    margin-bottom: 8px;
  }

  #tooltip .tt-content {
    color: #94A3B8;
    font-size: 12px;
    line-height: 1.7;
  }

  #tooltip .tt-date {
    font-size: 11px;
    color: #475569;
    margin-top: 8px;
  }

  #tooltip .tt-links {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 11px;
    color: #64748B;
  }

  #legend {
    position: fixed;
    bottom: 20px;
    left: 24px;
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: #64748B;
    z-index: 100;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  #stats {
    position: fixed;
    bottom: 20px;
    right: 24px;
    font-size: 11px;
    color: #475569;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="header">
  <h1>{{PROJECT_NAME}} <span>brain graph</span></h1>
  <div id="controls">
    <button class="view-toggle" id="viewToggle">Timeline</button>
    <input type="text" id="search" placeholder="Search nodes...">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="feature" style="--btn-color: #3B82F6; --btn-bg: rgba(59,130,246,0.15)">
      <span class="filter-dot" style="background: #3B82F6"></span>Feature
    </button>
    <button class="filter-btn" data-type="decision" style="--btn-color: #10B981; --btn-bg: rgba(16,185,129,0.15)">
      <span class="filter-dot" style="background: #10B981"></span>Decision
    </button>
    <button class="filter-btn" data-type="bug" style="--btn-color: #EF4444; --btn-bg: rgba(239,68,68,0.15)">
      <span class="filter-dot" style="background: #EF4444"></span>Bug
    </button>
    <button class="filter-btn" data-type="history" style="--btn-color: #8B5CF6; --btn-bg: rgba(139,92,246,0.15)">
      <span class="filter-dot" style="background: #8B5CF6"></span>History
    </button>
    <button class="filter-btn" data-type="architecture" style="--btn-color: #F59E0B; --btn-bg: rgba(245,158,11,0.15)">
      <span class="filter-dot" style="background: #F59E0B"></span>Architecture
    </button>
    <button class="filter-btn" data-type="pattern" style="--btn-color: #EC4899; --btn-bg: rgba(236,72,153,0.15)">
      <span class="filter-dot" style="background: #EC4899"></span>Pattern
    </button>
  </div>
</div>

<div id="tooltip">
  <div class="tt-type"></div>
  <div class="tt-title"></div>
  <div class="tt-content"></div>
  <div class="tt-date"></div>
  <div class="tt-links"></div>
</div>

<svg id="graph"></svg>

<div id="legend">
  <div class="legend-item"><span class="legend-dot" style="background: #3B82F6"></span>Feature</div>
  <div class="legend-item"><span class="legend-dot" style="background: #10B981"></span>Decision</div>
  <div class="legend-item"><span class="legend-dot" style="background: #EF4444"></span>Bug</div>
  <div class="legend-item"><span class="legend-dot" style="background: #8B5CF6"></span>History</div>
  <div class="legend-item"><span class="legend-dot" style="background: #F59E0B"></span>Architecture</div>
  <div class="legend-item"><span class="legend-dot" style="background: #EC4899"></span>Pattern</div>
</div>

<div id="stats">{{NODE_COUNT}} nodes · {{EDGE_COUNT}} edges</div>

<script>
const GRAPH_DATA = {{GRAPH_JSON}};

const TYPE_COLORS = {
  feature: '#3B82F6',
  decision: '#10B981',
  bug: '#EF4444',
  history: '#8B5CF6',
  architecture: '#F59E0B',
  pattern: '#EC4899',
  index: '#64748B',
  custom: '#64748B'
};

const TYPE_RADIUS = {
  feature: 14,
  decision: 10,
  bug: 10,
  history: 8,
  architecture: 12,
  pattern: 9,
  index: 16,
  custom: 8
};

const LANE_ORDER = ['feature', 'architecture', 'decision', 'pattern', 'history', 'bug', 'index', 'custom'];

const width = window.innerWidth;
const height = window.innerHeight;
let isTimeline = false;

const svg = d3.select('#graph')
  .attr('width', width)
  .attr('height', height);

const g = svg.append('g');
const timelineGroup = g.append('g').attr('class', 'timeline-layer').style('opacity', 0);

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 5])
  .on('zoom', (event) => g.attr('transform', event.transform));

svg.call(zoom);

// Parse dates for timeline
function parseDate(dateStr) {
  if (!dateStr) return null;
  const parts = dateStr.match(/(\d{4})-?(\d{2})?-?(\d{2})?/);
  if (!parts) return null;
  const y = parseInt(parts[1]);
  const m = parts[2] ? parseInt(parts[2]) - 1 : 0;
  const d = parts[3] ? parseInt(parts[3]) : 1;
  return new Date(y, m, d);
}

// Build timeline scale
const dates = GRAPH_DATA.nodes.map(n => parseDate(n.date)).filter(Boolean);
const minDate = d3.min(dates) || new Date();
const maxDate = d3.max(dates) || new Date();
const padding = (maxDate - minDate) * 0.1 || 86400000 * 30;
const timeScale = d3.scaleTime()
  .domain([new Date(minDate - padding), new Date(maxDate.getTime() + padding)])
  .range([160, width - 80]);

// Lane positions (y-axis by type)
const laneHeight = (height - 140) / LANE_ORDER.length;
function laneY(type) {
  const idx = LANE_ORDER.indexOf(type);
  return 80 + (idx >= 0 ? idx : LANE_ORDER.length - 1) * laneHeight + laneHeight / 2;
}

// Draw timeline elements (hidden initially)
function drawTimelineAxis() {
  timelineGroup.selectAll('*').remove();

  // Time axis
  const axisG = timelineGroup.append('g')
    .attr('class', 'timeline-axis')
    .attr('transform', `translate(0, ${height - 50})`);

  const axis = d3.axisBottom(timeScale)
    .ticks(d3.timeMonth.every(1))
    .tickFormat(d3.timeFormat('%b %Y'))
    .tickSize(-(height - 130));

  axisG.call(axis);
  axisG.selectAll('.domain').attr('stroke', 'rgba(255,255,255,0.06)');
  axisG.selectAll('.tick line')
    .attr('stroke', 'rgba(255,255,255,0.04)')
    .attr('stroke-dasharray', '2,4');
  axisG.selectAll('.tick text')
    .attr('fill', '#475569')
    .attr('font-size', '11px');

  // Lane labels
  LANE_ORDER.forEach((type, i) => {
    const y = 80 + i * laneHeight + laneHeight / 2;
    timelineGroup.append('text')
      .attr('class', 'timeline-lane-label')
      .attr('x', 20)
      .attr('y', y + 4)
      .text(type);

    if (i > 0) {
      timelineGroup.append('line')
        .attr('class', 'timeline-lane-line')
        .attr('x1', 0)
        .attr('x2', width)
        .attr('y1', 80 + i * laneHeight)
        .attr('y2', 80 + i * laneHeight);
    }
  });
}

drawTimelineAxis();

// Simulation
const simulation = d3.forceSimulation(GRAPH_DATA.nodes)
  .force('link', d3.forceLink(GRAPH_DATA.edges)
    .id(d => d.id)
    .distance(d => {
      const sourceType = typeof d.source === 'object' ? d.source.type : '';
      const targetType = typeof d.target === 'object' ? d.target.type : '';
      if (sourceType === 'feature' || targetType === 'feature') return 100;
      return 140;
    }))
  .force('charge', d3.forceManyBody().strength(-300))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => (TYPE_RADIUS[d.type] || 8) + 20));

// Edges
const link = g.append('g')
  .selectAll('line')
  .data(GRAPH_DATA.edges)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', d => {
    const sourceNode = GRAPH_DATA.nodes.find(n => n.id === (typeof d.source === 'object' ? d.source.id : d.source));
    return sourceNode ? TYPE_COLORS[sourceNode.type] || '#64748B' : '#64748B';
  });

// Nodes
const node = g.append('g')
  .selectAll('g')
  .data(GRAPH_DATA.nodes)
  .join('g')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

// Node circles
node.append('circle')
  .attr('r', d => TYPE_RADIUS[d.type] || 8)
  .attr('fill', d => TYPE_COLORS[d.type] || '#64748B')
  .attr('fill-opacity', 0.85)
  .attr('stroke', d => TYPE_COLORS[d.type] || '#64748B')
  .attr('stroke-width', 2)
  .attr('stroke-opacity', 0.3);

// Glow effect on features and index
node.filter(d => d.type === 'feature' || d.type === 'index')
  .select('circle')
  .attr('filter', 'url(#glow)');

// Define glow filter
const defs = svg.append('defs');
const filter = defs.append('filter').attr('id', 'glow');
filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'coloredBlur');
const feMerge = filter.append('feMerge');
feMerge.append('feMergeNode').attr('in', 'coloredBlur');
feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

// Labels
node.append('text')
  .attr('class', 'node-label')
  .attr('dy', d => (TYPE_RADIUS[d.type] || 8) + 16)
  .attr('text-anchor', 'middle')
  .text(d => d.label.length > 30 ? d.label.substring(0, 28) + '...' : d.label);

// Tooltip
const tooltip = d3.select('#tooltip');

node.on('mouseover', (event, d) => {
  const color = TYPE_COLORS[d.type] || '#64748B';

  tooltip.select('.tt-type').text(d.type).style('color', color);
  tooltip.select('.tt-title').text(d.label);
  tooltip.select('.tt-content').text(d.content || '');
  tooltip.select('.tt-date').text(d.date ? 'Date: ' + d.date : '');

  const linkedNodes = GRAPH_DATA.edges
    .filter(e => (e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id)
    .map(e => {
      const otherId = (e.source.id || e.source) === d.id ? (e.target.id || e.target) : (e.source.id || e.source);
      const otherNode = GRAPH_DATA.nodes.find(n => n.id === otherId);
      return otherNode ? otherNode.label : otherId;
    });

  tooltip.select('.tt-links').text(
    linkedNodes.length > 0 ? 'Connected to: ' + linkedNodes.join(', ') : ''
  );

  tooltip
    .style('display', 'block')
    .style('left', (event.clientX + 16) + 'px')
    .style('top', (event.clientY - 16) + 'px');

  // Highlight connected
  const connectedIds = new Set([d.id]);
  GRAPH_DATA.edges.forEach(e => {
    if ((e.source.id || e.source) === d.id) connectedIds.add(e.target.id || e.target);
    if ((e.target.id || e.target) === d.id) connectedIds.add(e.source.id || e.source);
  });

  node.select('circle').attr('fill-opacity', n => connectedIds.has(n.id) ? 1 : 0.15);
  node.select('text').attr('fill-opacity', n => connectedIds.has(n.id) ? 1 : 0.15);
  link.attr('stroke-opacity', e =>
    connectedIds.has(e.source.id || e.source) && connectedIds.has(e.target.id || e.target) ? 0.6 : 0.05
  );
})
.on('mouseout', () => {
  tooltip.style('display', 'none');
  node.select('circle').attr('fill-opacity', 0.85);
  node.select('text').attr('fill-opacity', 1);
  link.attr('stroke-opacity', 0.4);
});

// Simulation tick
simulation.on('tick', () => {
  if (isTimeline) return;
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Timeline mode
function switchToTimeline() {
  isTimeline = true;
  simulation.stop();

  timelineGroup.transition().duration(600).style('opacity', 1);

  // Calculate target positions
  GRAPH_DATA.nodes.forEach(d => {
    const date = parseDate(d.date);
    d.tx = date ? timeScale(date) : width / 2;
    d.ty = laneY(d.type);
  });

  // Nudge overlapping nodes in same lane+date
  const buckets = {};
  GRAPH_DATA.nodes.forEach(d => {
    const key = `${d.type}-${Math.round(d.tx / 30)}`;
    if (!buckets[key]) buckets[key] = [];
    buckets[key].push(d);
  });
  Object.values(buckets).forEach(group => {
    if (group.length > 1) {
      const spread = Math.min(laneHeight * 0.6, group.length * 25);
      group.forEach((d, i) => {
        d.ty += (i - (group.length - 1) / 2) * (spread / group.length);
      });
    }
  });

  // Animate nodes to timeline positions
  node.transition().duration(800).ease(d3.easeCubicInOut)
    .attr('transform', d => `translate(${d.tx},${d.ty})`);

  link.transition().duration(800).ease(d3.easeCubicInOut)
    .attr('x1', d => d.source.tx)
    .attr('y1', d => d.source.ty)
    .attr('x2', d => d.target.tx)
    .attr('y2', d => d.target.ty);
}

function switchToForce() {
  isTimeline = false;

  timelineGroup.transition().duration(400).style('opacity', 0);

  simulation.alpha(0.8).restart();
}

// View toggle
document.getElementById('viewToggle').addEventListener('click', () => {
  const btn = document.getElementById('viewToggle');
  if (isTimeline) {
    btn.textContent = 'Timeline';
    btn.classList.remove('active-timeline');
    switchToForce();
  } else {
    btn.textContent = 'Force';
    btn.classList.add('active-timeline');
    switchToTimeline();
  }
});

// Drag
function dragstarted(event) {
  if (isTimeline) return;
  if (!event.active) simulation.alphaTarget(0.3).restart();
  event.subject.fx = event.subject.x;
  event.subject.fy = event.subject.y;
}

function dragged(event) {
  if (isTimeline) return;
  event.subject.fx = event.x;
  event.subject.fy = event.y;
}

function dragended(event) {
  if (isTimeline) return;
  if (!event.active) simulation.alphaTarget(0);
  event.subject.fx = null;
  event.subject.fy = null;
}

// Search
document.getElementById('search').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  if (!query) {
    node.select('circle').attr('fill-opacity', 0.85);
    node.select('text').attr('fill-opacity', 1);
    link.attr('stroke-opacity', 0.4);
    return;
  }

  const matchIds = new Set();
  GRAPH_DATA.nodes.forEach(n => {
    if (n.label.toLowerCase().includes(query) || (n.content || '').toLowerCase().includes(query)) {
      matchIds.add(n.id);
    }
  });

  const expandedIds = new Set(matchIds);
  GRAPH_DATA.edges.forEach(e => {
    const sid = e.source.id || e.source;
    const tid = e.target.id || e.target;
    if (matchIds.has(sid)) expandedIds.add(tid);
    if (matchIds.has(tid)) expandedIds.add(sid);
  });

  node.select('circle').attr('fill-opacity', n => matchIds.has(n.id) ? 1 : expandedIds.has(n.id) ? 0.5 : 0.1);
  node.select('text').attr('fill-opacity', n => matchIds.has(n.id) ? 1 : expandedIds.has(n.id) ? 0.6 : 0.1);
  link.attr('stroke-opacity', e => {
    const sid = e.source.id || e.source;
    const tid = e.target.id || e.target;
    return expandedIds.has(sid) && expandedIds.has(tid) ? 0.5 : 0.03;
  });
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const type = btn.dataset.type;
    if (type === 'all') {
      node.select('circle').attr('fill-opacity', 0.85);
      node.select('text').attr('fill-opacity', 1);
      link.attr('stroke-opacity', 0.4);
      return;
    }

    const matchIds = new Set();
    GRAPH_DATA.nodes.forEach(n => { if (n.type === type) matchIds.add(n.id); });

    const expandedIds = new Set(matchIds);
    GRAPH_DATA.edges.forEach(e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      if (matchIds.has(sid)) expandedIds.add(tid);
      if (matchIds.has(tid)) expandedIds.add(sid);
    });

    node.select('circle').attr('fill-opacity', n => matchIds.has(n.id) ? 1 : expandedIds.has(n.id) ? 0.5 : 0.1);
    node.select('text').attr('fill-opacity', n => matchIds.has(n.id) ? 1 : expandedIds.has(n.id) ? 0.6 : 0.1);
    link.attr('stroke-opacity', e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      return expandedIds.has(sid) && expandedIds.has(tid) ? 0.5 : 0.03;
    });
  });
});

// Responsive
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  svg.attr('width', w).attr('height', h);
  timeScale.range([160, w - 80]);
  drawTimelineAxis();
  if (!isTimeline) {
    simulation.force('center', d3.forceCenter(w / 2, h / 2));
    simulation.alpha(0.3).restart();
  } else {
    switchToTimeline();
  }
});
</script>
</body>
</html>
